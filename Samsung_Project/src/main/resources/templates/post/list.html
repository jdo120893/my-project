<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>게시글 목록</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 30px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #f2f2f2; }
        tr:hover { background-color: #f5f5f5; }
        .btn { padding: 8px 12px; background-color: #007bff; color: white; text-decoration: none; border-radius: 4px; }
        .search-container { margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .pagination { margin-top: 20px; display: flex; gap: 5px; }
        .pagination a, .pagination span { padding: 8px 12px; border: 1px solid #ddd; text-decoration: none; color: black; }
        .pagination .active { background-color: #007bff; color: white; border: 1px solid #007bff; }
    </style>
</head>
<body>

<h2>📝 게시판</h2>

<div class="search-container">
    <form th:action="@{/posts/search}" method="get">
        <input type="text" name="keyword" th:value="${keyword}" placeholder="검색어를 입력하세요" required>
        <button type="submit">검색</button>
        <a th:if="${keyword != null}" th:href="@{/posts}" style="margin-left: 10px; color: gray;">초기화</a>
    </form>

    <a th:href="@{/posts/new}" class="btn">글쓰기</a>
</div>

<table>
    <thead>
    <tr>
        <th style="width: 10%;">번호</th>
        <th>제목</th>
        <th style="width: 20%;">작성일</th>
    </tr>
    </thead>
    <tbody>
    <tr th:if="${#lists.isEmpty(posts)}">
        <td colspan="3" style="text-align: center;">등록된 게시글이 없습니다.</td>
    </tr>
    <tr th:each="post, iterStat : ${posts}">
        <td th:text="${pageInfo.totalElements - (pageInfo.number * pageInfo.size) - iterStat.index}">1</td>
        <td>
            <a th:href="@{/posts/{id}(id=${post.id})}" th:text="${post.title}" style="color: #333; text-decoration: none; font-weight: bold;">제목입니다</a>
        </td>
        <td th:text="${post.postedDate != null ? post.postedDate.toLocalDate() : '-'}">2026-06-18</td>
    </tr>
    </tbody>
</table>

<div class="pagination" th:if="${pageInfo != null and pageInfo.totalPages > 0}">
    <a th:if="${pageInfo.hasPrevious()}" th:href="@{/posts(page=${pageInfo.number - 1}, size=${pageInfo.size})}">&laquo; 이전</a>

    <th:block th:each="pageNumber : ${#numbers.sequence(0, pageInfo.totalPages - 1)}">
        <a th:if="${pageNumber != pageInfo.number}"
           th:href="@{/posts(page=${pageNumber}, size=${pageInfo.size})}"
           th:text="${pageNumber + 1}">1</a>
        <span th:if="${pageNumber == pageInfo.number}"
              class="active"
              th:text="${pageNumber + 1}">1</span>
    </th:block>

    <a th:if="${pageInfo.hasNext()}" th:href="@{/posts(page=${pageInfo.number + 1}, size=${pageInfo.size})}">다음 &raquo;</a>
</div>

</body>
</html>
