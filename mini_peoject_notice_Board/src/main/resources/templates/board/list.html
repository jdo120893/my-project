<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>목록</title>
    <link rel="stylesheet" th:href="@{/css/register.css}">
</head>
<body>
<div class="wrap">
    <h1>목록</h1>

    <form th:action="@{/search}" method="get">
        <select name="type">
            <option value="title">제목</option>
            <option value="content">내용</option>
            <option value="name">작성자</option>
        </select>
        <input type="text" name="keyword" th:value="${keyword}" placeholder="검색어"/>
        <button type="submit">검색</button>
    </form>

    <table class="board-table">
        <tr>
            <th>ID</th>
            <th>이름</th>
            <th>제목</th>
            <th>등록일</th>
            <th>조회수</th>
        </tr>
        <tr th:each="board : ${boards.content}">
            <td th:text="${board.id}"></td>
            <td th:text="${board.name}"></td>
            <td>
                <a th:href="@{/view/{id}(id=${board.id})}"   <!-- ✅ 수정 -->
                th:text="${board.title}"></a>
            </td>
            <td th:text="${board.createdAt}"></td>
            <td th:text="${board.viewCount}"></td>
        </tr>
    </table>                                                  <!-- ✅ table 먼저 닫기 -->

    <!-- 페이지 네비게이션 - table 밖으로 -->
    <div th:if="${boards.totalPages > 1}">
        <a th:if="${!boards.first}"
           th:href="${keyword != null} ? @{/search(type=${type}, keyword=${keyword}, page=${boards.number - 1})} : @{/list(page=${boards.number - 1})}">이전</a>

        <a th:each="i : ${#numbers.sequence(0, boards.totalPages - 1)}"
           th:href="${keyword != null} ? @{/search(type=${type}, keyword=${keyword}, page=${i})} : @{/list(page=${i})}"
           th:text="${i + 1}"
           th:style="${i == boards.number} ? 'font-weight:bold'">
        </a>

        <a th:if="${!boards.last}"
           th:href="${keyword != null} ? @{/search(type=${type}, keyword=${keyword}, page=${boards.number + 1})} : @{/list(page=${boards.number + 1})}">다음</a>
    </div>

    <a th:href="@{/writeform}" class="write-btn">글쓰기</a>
</div>
</body>
</html>
