<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>특정목록</title>
    <link rel="stylesheet" th:href="@{/css/register.css}">
</head>
<body>
    <div class="wrap">
<h1>특정목록</h1>
<div class="view-box">
    <h2 th:text="${boards.title}"></h2>
    <div class="view-info">
        <span th:text="${boards.name}"></span>
        <span th:text="${boards.createdAt}"></span>
    </div>
    <div class="view-content" th:text="${boards.content}"></div>
    <div class="btn-group">
    <a th:href="@{/updateform/{id}(id=${boards.id})}" class="btn-green">수정</a>
    <a th:href="@{/deleteform/{id}(id=${boards.id})}" class="btn-red">삭제</a>
    <a href="/list" class="btn-gray">목록</a>
           </div>
        </div>
    </div>
</body>
</html>
