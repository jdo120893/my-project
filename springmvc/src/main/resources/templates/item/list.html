<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>item list</title>
</head>
<body>
<h1>item list</h1>
<ul>
    <li th:each="item:${items}" th:text="${item.name}+':::'+${item.price}"></li>

</ul>

<table>
    <thead>
    <tr>
    <th>상품명</th>
        <th>가격</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="item:${items}">
        <td th:text="${item.name}"></td>
        <td th:text="${item.price}"></td>
    </tr>

    </tbody>
</table>
</body>
</html>
