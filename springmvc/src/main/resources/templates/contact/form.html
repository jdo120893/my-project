<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>연락처</title>
    <style>
        .container {
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input[type="text"],
        input[type="email"],
        textarea {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
        }
        textarea {
            min-height: 150px;
        }
        .btn {
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>
<div class="container">
    <hi>문의하기</hi>

    <form th:action="@{/contact}"
          th:object="${contactForm}"
          method="post">

        <div class="form-group">
            <label for="name">이름</label>
            <input type="text"
                   id="name"
                   th:field="*{name}"
                   required>
        </div>

        <div class="form-group">
            <label for="email">이메일</label>
            <input type="email"
                   id="email"
                   th:field="*{email}"
                   required>
        </div>

        <div class="form-group">
            <label for="message">메세지</label>
            <textarea id="message"
                      th:field="*{message}"
                      required></textarea>
        </div>

        <button type="submit" class="btn">전송</button>
    </form>
</div>
</body>
</html>
