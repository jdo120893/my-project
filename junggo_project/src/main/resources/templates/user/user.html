<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>JUNGGO</title>
    <link rel="stylesheet" th:href="@{/css/register.css}">
</head>
<body>
<header>
    <a th:href="@{/}"><img th:src="@{/images/logo.png}" alt="로고"></a>
</header>
<div class="wrap">
    <div class="register-box">
        <h2>회원가입</h2>
        <form method="post" action="/user/join">
            <div class="input-box">
                <p>이름</p>
                <input type="text" name="name" placeholder="이름 입력">
            </div>
            <div class="input-box">
                <p>이메일</p>
                <input type="text" name="email" placeholder="이메일 입력">
            </div>
            <div class="input-box">
                <p>비밀번호</p>
                <input type="text" name="password" placeholder="비밀번호 입력">
            </div>
            <div class="input-box">
                <p>비밀번호 확인</p>
                <input type="text" name="password-check" placeholder="비밀번호 확인">
            </div>
            <div class="input-box">
                <p>닉네임</p>
                <input type="text" name="nickname" placeholder="닉네임 입력">
            </div>
            <div class="input-box">
                <p>주소</p>
                <input type="text" name="address" placeholder="주소 입력">
            </div>
            <div class="input-box">
                <p>전화번호</p>
                <input type="text" name="phone_number" placeholder="전화번호 입력">
            </div>
            <button type="submit">회원가입</button>
        </form>
    </div>
</div>
</body>
</html>
